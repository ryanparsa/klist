id: CODE-9
title: Prevent Sensitive Data Leaks in Application Logs
stage: active
description: |
  Applications often log configuration or environment state during startup or errors. If secrets are handled improperly in code or passed as environment variables, they may be written to stdout/stderr. This exposes them to anyone with permission to view logs and to downstream centralized logging platforms where they are often stored in plaintext with long retention.

  **What to check:**
  Review application logs for accidentally exposed credentials, tokens, or PII:
  ```bash
  kubectl logs <pod-name> | grep -Ei "pass|token|key|secret"
  ```
  Check if centralized logging platforms (e.g., Elasticsearch, CloudWatch) contain sensitive data.

  ```mermaid
  flowchart TD
    A[App Startup/Error] -->|Logs sensitive env| B[stdout/stderr]
    B --> C[Container Logs]
    C --> D[Centralized Logging Store]
    D --> E[Unauthorized Disclosure]
  ```
mitigations:
  - "Sanitize application logs to remove sensitive information (PII, credentials, tokens) before they are written to stdout/stderr."
  - "Avoid logging entire configuration objects or environment variable maps."
  - "Use a standard logging library that supports masking or redacting sensitive fields based on patterns."
  - "Adopt Workload Identity to eliminate the need for static credentials that could be logged."
  - "Mount secrets as volumes (CONT-20) instead of environment variables to reduce the risk of accidental logging."
tags:
  - logging
  - secrets
  - application-development
  - observability
tools:
  - title: Fluentd (Redact Filter)
    url: https://docs.fluentd.org/filter/record_transformer
references:

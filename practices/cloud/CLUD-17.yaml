id: CLUD-17
title: Enable Control Plane Logs for Managed Kubernetes
stage: active
description: |
  Managed Kubernetes control plane components (API server, scheduler, controller manager,
  audit, and authenticator) do not emit logs by default. These logs are essential for
  security investigations, incident response, and compliance auditing.

  Without control plane logs, there is no record of API requests, authentication decisions,
  scheduling events, or controller actions that occurred before an incident was detected.


  **What to check:**
  ```bash
  aws eks describe-cluster --name <cluster-name> --query 'cluster.logging.clusterLogging'
  ```

  ```mermaid
  flowchart TD
    A[API Server] -->|Audit Logs| B[CloudWatch/Stackdriver]
    C[Scheduler] -->|Scheduler Logs| B
  ```
mitigations:
  - Enable all available control plane log types for the managed cluster. Route logs to a
    centralised, tamper-resistant store and set a retention period of at least 90 days active
    and 1 year archived to satisfy common compliance requirements.

  - |
    EKS - Enable the following log types via the AWS console or CLI:
    - `api` - API server request logs
    - `audit` - Kubernetes audit log (who did what to which resource)
    - `authenticator` - IAM-to-RBAC mapping decisions (records how AWS IAM identities are resolved to Kubernetes users/groups)
    - `controllerManager` - controller reconciliation events
    - `scheduler` - pod scheduling decisions

    ```bash
    aws eks update-cluster-config \
      --name <cluster-name> \
      --logging '{"clusterLogging":[{"types":["api","audit","authenticator","controllerManager","scheduler"],"enabled":true}]}'
    ```
  - GKE - Enable Cloud Logging for control plane components in the cluster observability settings.
  - AKS - Enable Diagnostic Settings to route control plane logs to Log Analytics.


tags:
  - logging
  - audit
  - compliance
  - cloud


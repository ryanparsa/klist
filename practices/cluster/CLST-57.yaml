id: CLST-57
title: Implement Centralized Policy Enforcement via Admission Control
stage: active
description: |
  Kubernetes clusters often lack a centralized mechanism for enforcing security and operational best practices. Relying solely on manual reviews or CI/CD pipeline checks is insufficient, as users with direct API access can bypass these controls. This leads to inconsistent security postures, metadata trust abuse (e.g., spoofing labels to bypass security checks), and non-compliant resource configurations.

  Centralized policy enforcement ensures that every resource request—regardless of its origin—is validated against organizational standards before being persisted. Modern Kubernetes versions support built-in **Validating Admission Policy (VAP)** using the **Common Expression Language (CEL)**, providing high-performance, tool-agnostic policy definition. For more complex logic, external policy engines can be used via admission webhooks.

  **What to check:**
  - Are critical constraints (e.g., restricted registries, mandatory labels) enforced cluster-wide?
  - Are built-in ValidatingAdmissionPolicies or external policy engines active?
  - Can a user with cluster access create a resource that violates organizational standards?
  - Is there an audit trail for policy violations in the cluster logs?

  **Verification:**
  ```bash
  # Check for built-in Validating Admission Policies
  kubectl get validatingadmissionpolicies

  # Check for Admission Webhooks (used by external policy engines)
  kubectl get validatingwebhookconfigurations
  ```
mitigations:
  - "Implement Validating Admission Policy (VAP) to define and enforce resource constraints using CEL directly within the Kubernetes API server."
  - "Deploy a dedicated policy engine for complex governance requirements that exceed the capabilities of built-in admission controllers."
  - "Enforce metadata integrity by validating labels and annotations used for security and routing decisions."
  - "Adopt a 'Warn then Enforce' rollout strategy by initially deploying policies in audit mode to identify non-compliant workloads without causing disruption."
tags:
  - governance
  - security
  - admission-control
  - hardening

id: CLST-62
title: Enable Kubernetes Network Observability
stage: draft
description: |
  Without network observability, teams have no visibility into pod-to-pod traffic flows,
  DNS resolution patterns, or unexpected cross-namespace connections. When an incident
  occurs — lateral movement, data exfiltration, or a misconfigured NetworkPolicy silently
  dropping traffic — there is no baseline to compare against and no forensic data to
  investigate. Network observability complements NetworkPolicies (CLST-12, CLST-34):
  policies define what is allowed, observability shows what is actually happening.

  **What to check:**

  Verify that a network observability component is running:
  ```
  kubectl get pods -A | grep -E 'retina|hubble|calico-node'
  ```

  Confirm network metrics are being exported to Prometheus or a cloud-native backend:
  ```
  kubectl get servicemonitor -A
  ```
mitigations:
  - |-
    Deploy an eBPF-based network observability tool. Microsoft Retina is cloud-agnostic
    and provides DNS latency, TCP drop rate, and per-flow metrics exportable to Prometheus
    or Azure Monitor. If Cilium is your CNI, enable Hubble for per-flow connection logs
    with source, destination, port, and verdict (forwarded/dropped).
  - |-
    Configure alerts on critical network signals: DNS error rate spikes (service
    misconfiguration or DNS hijacking), TCP drop rate increases (NetworkPolicy
    misconfiguration or in-cluster scanning), and unexpected inter-namespace traffic
    (potential lateral movement).
  - |-
    Use on-demand packet capture for incident response rather than running continuous
    full captures. Both Retina and Hubble support scoped captures by namespace, pod
    selector, and duration to limit storage overhead.
tags:
  - network
  - observability
  - monitoring
  - ebpf
  - security

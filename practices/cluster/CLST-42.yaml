id: CLST-42
title: Restrict Creation of RoleBindings and ClusterRoleBindings to cluster-admin
stage: active
description: |
  The built-in `cluster-admin` ClusterRole grants unrestricted access to every resource and
  operation in the cluster. An attacker or compromised account with permissions to create
  `RoleBindings` or `ClusterRoleBindings` can escalate their own privileges by binding any identity to
  `cluster-admin` or other highly privileged roles, effectively taking over the cluster.

  **What to check:** Identify who can create or modify RoleBindings and ClusterRoleBindings:
  ```
  kubectl auth can-i create clusterrolebindings --all-namespaces --as <user-or-sa>
  kubectl auth can-i create rolebindings --all-namespaces --as <user-or-sa>
  kubectl get clusterrolebindings,rolebindings -o json | \
    jq '.items[] | select(.roleRef.name == "cluster-admin") | .subjects'
  ```
mitigations:
  - "Restrict `create`, `update`, `patch`, and `delete` permissions on `rolebindings` and `clusterrolebindings` to a very small set of break-glass admin accounts only."
  - "Regularly audit and trim the list of cluster-admin bindings."
  - "Alert via audit logs whenever a new RoleBinding or ClusterRoleBinding is created targeting `cluster-admin`."
tags:
  - rbac
  - privilege-escalation
  - security
  - audit

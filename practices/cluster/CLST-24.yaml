id: CLST-24
title: Ensure Cluster Passes CIS Benchmark
stage: active
description: |
  Clusters that deviate from established industry security standards natively introduce known configuration vulnerabilities. The Centre for Internet Security (CIS) benchmark provides the canonical baseline for securing Kubernetes clusters against widespread attack vectors.

  **What to check:**
  ```bash
  kube-bench run --targets master,node
  ```

  ```mermaid
  flowchart TD
    A[Kube-bench] --> B[Master Nodes]
    A --> C[Worker Nodes]
    B --> D[Compliance Report]
  ```
mitigations:
  - "Run `kube-bench` as a Job or DaemonSet on each node."
  - "Review the output and address all FAIL findings."
  - "Prioritise Level 1 (must-have) checks before Level 2."
  - "For managed clusters, remediate worker-node findings only - control-plane checks are the provider's responsibility."
  - "Re-run after every cluster upgrade."
tags:
  - configuration
  - security
  - cis
tools:
  - title: kube-bench
    url: https://github.com/aquasecurity/kube-bench
  - title: Trivy
    url: https://trivy.dev/
references:
  - title: "OWASP Kubernetes Top 10 (2022) - K09: Misconfigured Cluster Components"
    url: https://owasp.org/www-project-kubernetes-top-ten/2022/en/src/K09-misconfigured-cluster-components
  - title: CIS Kubernetes Benchmark
    url: https://www.cisecurity.org/benchmark/kubernetes/
  - title: kube-bench - CIS Kubernetes Benchmark Tool
    url: https://github.com/aquasecurity/kube-bench

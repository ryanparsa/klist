id: CLST-24
title: Harden and Audit Cluster Component Configurations
stage: active
description: |
  Kubernetes components (API server, scheduler, controller-manager, kubelet, and kube-proxy) often ship with unhardened default settings. Vulnerabilities or misconfigurations in these core components can allow attackers to gain initial access, escalate privileges, or compromise the entire cluster. Regular auditing against established security benchmarks is essential to maintain a hardened posture.

  **What to check:**
  - Audit the cluster against the CIS Kubernetes Benchmark or similar hardening guides.
  - Check for unpatched vulnerabilities in cluster components and the container runtime.
  - Verify that default settings have been reviewed and hardened according to the principle of least privilege.

  ```bash
  # Example check using kube-bench
  kube-bench run --targets master,node
  ```

  ```mermaid
  flowchart TD
    A[Hardening Guide / CIS] --> B[Audit Tools]
    B --> C[Control Plane Components]
    B --> D[Worker Node Components]
    C & D --> E[Remediation Plan]
  ```
mitigations:
  - "Run `kube-bench` or `Kubescape` regularly to audit the cluster configuration."
  - "Address all 'FAIL' findings, prioritizing critical components and Level 1 checks."
  - "Harden worker nodes by disabling unnecessary services and ports."
  - "For managed clusters, focus on worker-node and add-on hardening as the provider manages the control plane."
  - "Re-audit after every cluster upgrade or significant configuration change."
tags:
  - configuration
  - security
  - hardening
  - compliance
tools:

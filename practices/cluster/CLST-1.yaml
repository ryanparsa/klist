id: CLST-1
title: Disable Anonymous Authentication on the API Server
stage: active
description: |
  By default, Kubernetes may allow unauthenticated requests to reach the API server.
  This presents an information leakage risk as unauthenticated users can access the
  `/version` endpoint to retrieve exact cluster version details. Setting
  `--anonymous-auth=false` ensures every request must carry valid credentials,
  eliminating a class of unauthenticated access attacks and discovery probes.

  **What to check:** On the control-plane node, inspect the kube-apiserver static pod manifest
  or process arguments:

  ```
  ps aux | grep kube-apiserver | grep anonymous-auth
  ```

  The flag must be `--anonymous-auth=false`. If the flag is absent, the default is `true`
  (insecure).
mitigations:
  - |-
    Add `--anonymous-auth=false` to the kube-apiserver command arguments in
    `/etc/kubernetes/manifests/kube-apiserver.yaml`. On managed clusters (EKS/GKE/AKS), this
    is typically controlled through cluster configuration options.

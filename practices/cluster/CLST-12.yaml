id: CLST-12
title: Apply Default-Deny NetworkPolicies in All Namespaces
stage: active
description: |
  By default, Kubernetes does not restrict traffic between pods or from pods to services in the control plane. Without NetworkPolicies, every pod in a cluster can reach any other pod on any port.
  A single compromised workload can freely probe databases, internal services, and the
  Kubernetes control plane or node-level administrative services. Additionally, lack of outbound (egress) restrictions allows attackers to exfiltrate data from the cluster or access sensitive external services. A default-deny policy in every namespace closes these attack paths.

  **What to check:**

  ```
  kubectl get networkpolicy -A
  ```

  Every namespace must contain a default-deny-all ingress and egress policy. Verify with:

  ```
  kubectl get networkpolicy -n <namespace> -o yaml | grep policyTypes
  ```
mitigations:
  - |-
    Create a default-deny policy in every namespace, then selectively open
    traffic with additional NetworkPolicies for legitimate flows. Use a CNI plugin that
    enforces NetworkPolicies (Calico, Cilium, Weave Net - not flannel alone).

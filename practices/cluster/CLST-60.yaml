id: CLST-60
title: Isolate High-Risk Workloads in Dedicated Clusters
stage: active
description: |
  While namespaces and NetworkPolicies provide logical isolation, the cluster itself is
  the strongest security boundary in Kubernetes. For high-risk workloads, untrusted
  third-party code, or strict multi-tenant requirements, physical isolation into
  dedicated clusters provides the best protection against "blast radius" escalation
  and kernel-level exploits.

  Separating workloads by risk profile (e.g., PCI-DSS compliant vs non-compliant) or
  environment (Dev vs Prod) ensures that a compromise in one cluster cannot easily
  spread to another via internal network paths or shared control plane components.

  **What to check:**
  - Are production and development workloads running on the same cluster?
  - Are high-risk or public-facing workloads isolated from internal sensitive services?
  - Review the cluster separation strategy and verify that different contexts are used
    for distinct risk profiles.
mitigations:
  - "Utilize separate clusters for different environments (Development, Staging, Production)."
  - "Isolate sensitive data-processing workloads in dedicated clusters with hardened configurations."
  - "For multi-tenant SaaS providers, consider a 'cluster-per-tenant' model for high-value customers to provide absolute network and control plane isolation."
tags:
  - multi-cluster
  - network
  - blast-radius
  - isolation

id: CLST-32
title: Enforce Principle of Least Privilege in RBAC Policies
stage: active
description: |
  Granting broad permissions in RBAC policies provides unnecessary API access and poses a significant security risk. The Principle of Least Privilege dictates that an entity should only be granted the absolute minimum permissions required to perform its function.

  Avoid sharing generic, broad RBAC policies across diverse workloads. Use custom, fine-grained roles based on distinct job functions to ensure a compromised service account cannot affect unrelated namespaces or resource types.

  Be particularly cautious with `list` and `watch` verbs. A `list` response contains full object attributes (including data in Secrets), not just names. Similarly, `watch` allows an account to receive full object details for every change. Only grant these permissions if the account truly needs to see all resource attributes in the given scope.

  **What to check:**
  ```bash
  kubectl auth can-i --list --as <subject>
  kubectl get clusterrolebindings -o yaml | grep cluster-admin
  kubectl get roles -A
  ```

  ```mermaid
  flowchart TD
    A[App A SA] -->|RoleBinding A| B[Role A]
    C[App B SA] -->|RoleBinding B| D[Role B]
    B --> E[Specific Resources Allowed]
    D --> F[Specific Resources Allowed]
  ```
mitigations:
  - "Start with an empty Role and add only the specific API groups, resources, and verbs required."
  - "Define a Role catalog per team or function (e.g., `viewer`, `developer`, `operator`, `ci-deployer`)."
  - "Create namespace-scoped Roles rather than ClusterRoles where possible."
  - "Use `kubectl auth can-i --list` to verify actual permissions."
  - "Run RBAC Lookup or Krane to identify over-permissioned service accounts and roles."
  - "Audit RBAC manifests included with third-party or open-source components before deployment."
  - "Adopt a GitOps approach for RBAC manifests to ensure all permissions are peer-reviewed."

id: CLST-32
title: Enforce Principle of Least Privilege in RBAC Policies
stage: active
description: |
  Granting broad permissions in RBAC policies provides unnecessary API access and poses a significant security risk. The Principle of Least Privilege dictates that an entity should only be granted the absolute minimum permissions required to perform its function.

  **Dangerous Verbs and Resources:**
  Avoid granting high-risk verbs like `impersonate` (allows acting as another user), `bind` (allows binding to privileged roles), or `escalate` (allows creating roles with more permissions than the current user). Similarly, be cautious with `patch` on `namespaces`, as it allows modifying namespace labels which can bypass Pod Security Admission (PSA) or disrupt NetworkPolicies that rely on label selectors.

  **Third-Party and Shadow RBAC:**
  Third-party Helm charts and Operators often provision over-privileged roles or use wildcards by default. Additionally, "ClusterRole Aggregation" can allow third-party components to silently extend built-in roles (like `admin` or `edit`) by adding matching labels to their custom ClusterRoles.

  **Multiple Authorizers:**
  Kubernetes permissions are the union of all rights provided by all configured authorizers (e.g., RBAC and Webhooks). Because `kubectl auth can-i --list` often only accounts for RBAC, it is critical to audit all configured authorization modes to understand the true posture of a principal.

  Be particularly cautious with `list` and `watch` verbs. A `list` response contains full object attributes (including data in Secrets), not just names. Similarly, `watch` allows an account to receive full object details for every change. Only grant these permissions if the account truly needs to see all resource attributes in the given scope.

  **What to check:**
  ```bash
  kubectl auth can-i --list --as <subject>
  # Check for cluster-admin bindings
  kubectl get clusterrolebindings -o yaml | grep cluster-admin

  # Audit dangerous verbs
  kubectl get clusterroles,roles -A -o json | \
    jq '.items[] | select(.rules[]? | .verbs[] | select(. == "impersonate" or . == "bind" or . == "escalate"))'

  # Check for aggregated ClusterRoles
  kubectl get clusterroles -o json | jq '.items[] | select(.aggregationRule != null)'
  ```

  ```mermaid
  flowchart TD
    A[App A SA] -->|RoleBinding A| B[Role A]
    C[App B SA] -->|RoleBinding B| D[Role B]
    B --> E[Specific Resources Allowed]
    D --> F[Specific Resources Allowed]
  ```
mitigations:
  - "Start with an empty Role and add only the specific API groups, resources, and verbs required."
  - "Define a Role catalog per team or function (e.g., `viewer`, `developer`, `operator`, `ci-deployer`)."
  - "Create namespace-scoped Roles rather than ClusterRoles where possible."
  - "Avoid using built-in ClusterRoles like `view`, `edit`, or `admin` for automation; use custom, granular roles instead."
  - "Audit third-party manifests and Helm charts for excessive permissions and wildcards before deployment."
  - "For administrators, use the impersonation system to provide a lower privileged main account that can escalate for specific tasks."
  - "Use `kubectl auth can-i --list` to verify RBAC permissions and audit webhook authorizers separately."
  - "Run RBAC Lookup or Krane to identify over-permissioned service accounts and roles."
  - "Adopt a GitOps approach for RBAC manifests to ensure all permissions are peer-reviewed."

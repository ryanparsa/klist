id: CLST-9
title: Audit and Remove Wildcard RBAC Permissions
stage: active
description: |
  RBAC roles that use wildcard (`*`) verbs or resources grant far broader access than intended.
  A single compromised service account with wildcard access can read all secrets, modify any
  workload, or escalate privileges cluster-wide.

  **Third-Party Manifests and Helm Charts:**
  Many third-party applications, Operators, and community-maintained Helm charts provision
  over-privileged RBAC roles using wildcards to ensure out-of-the-box functionality. This
  creates a broad blast radius where a compromised application inherits administrative
  capabilities across the cluster.

  **What to check:** Identify roles that use wildcards and the subjects bound to them.

  ```bash
  # List all Roles and ClusterRoles that use wildcards
  kubectl get clusterroles,roles -A -o json | \
    jq -r '.items[] | select(.rules[]? | (.verbs[] == "*" or .resources[] == "*")) | .metadata.name'

  # Audit bindings for a specific wildcard role
  kubectl get clusterrolebindings,rolebindings -A -o json | \
    jq '.items[] | select(.roleRef.name == "<role-name>") | .subjects'
  ```
mitigations:
  - |-
    Replace wildcard rules with explicit, minimal permissions. Conduct a
    quarterly review of all RoleBindings and ClusterRoleBindings. Remove any bindings that are
    no longer required. Automate detection with tools such as RBAC Lookup, Krane, or Audit2RBAC.
  - "Before deploying third-party charts or operators, audit their RBAC manifests for wildcard verbs (`*`) or resources (`*`)."
tags:

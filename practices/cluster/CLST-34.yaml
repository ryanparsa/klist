id: CLST-34
title: Enable Network Policies via CNI Plugin
stage: active
description: |
  By default, Kubernetes allows open communication between all Pods and nodes in the cluster. Network segmentation cannot be enforced unless a Container Network Interface (CNI) plugin (like Calico or Cilium) that natively supports and enforces Kubernetes Network Policies is deployed.

  **What to check:**
  Identify the installed CNI plugin and verify it supports NetworkPolicy enforcement:
  ```bash
  kubectl get pods -n kube-system -l "app.kubernetes.io/component=network-plugin"
  ```
  Alternatively, check the CNI configuration on a node:
  ```bash
  ls /etc/cni/net.d/
  ```

  ```mermaid
  flowchart TD
    A[Frontend Pod] -->|Allowed| B[Backend Pod]
    C[Other Namespace] --x|Denied| B
  ```
mitigations:
  - "Replace or supplement kubenet/flannel with a CNI plugin that enforces NetworkPolicy (e.g., Cilium or Calico)."
  - "Verify the CNI is active by checking the status of its controller or daemonset pods in the `kube-system` namespace."
  - "Test enforcement by applying a default-deny NetworkPolicy and confirming traffic is blocked."
tags:
  - governance
  - network
  - security

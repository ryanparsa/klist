id: CLST-51
title: Disable the Kubelet Read-Only Port
stage: active
description: |
  The kubelet exposes an unauthenticated, read-only HTTP API on port 10255 by default.
  This port leaks pod listings, running container metadata, and node resource information
  to any network-accessible caller without requiring credentials. It must be disabled.

  **What to check:** On each node, verify the kubelet configuration:

  ```
  cat /var/lib/kubelet/config.yaml | grep readOnlyPort
  ```

  The value must be `readOnlyPort: 0`. If the field is absent, the default (10255) is
  active and must be explicitly disabled.

  Also confirm the port is not listening:

  ```
  ss -tlnp | grep 10255
  ```

  No output is the expected result.
mitigations:
  - |-
    Set `readOnlyPort: 0` in the KubeletConfiguration file
    (`/var/lib/kubelet/config.yaml`) and restart the kubelet. On managed clusters,
    apply the equivalent node-pool configuration option (e.g., `--read-only-port=0`
    in the kubelet extra-args).
tags:
  - kubelet
  - network
  - information-disclosure
  - hardening

id: CONT-3
title: Run Containers as Non-Root
stage: active
description: |
  Containers running as UID 0 (root) can exploit vulnerabilities to gain root access on the
  host node. Setting `runAsNonRoot: true` ensures the container's process runs as an
  unprivileged user, limiting blast radius if the container is compromised. Alternatively,
  User Namespaces (available since Kubernetes 1.30) can be used to map the container's root
  user to a non-privileged user on the host.

  **What to check:**

  ```
  kubectl get pods -A -o json | \
    jq '.items[] | select(
      (.spec.securityContext.runAsNonRoot != true) and
      (.spec.containers[].securityContext.runAsNonRoot != true)
    ) | .metadata.name'
  ```
mitigations:
  - |-
    Add `securityContext.runAsNonRoot: true` and `securityContext.runAsUser: <non-zero UID>`
    to pod and container specs. Update base images to create and use a non-root user via
    `USER <uid>` in the Dockerfile.
  - |-
    Enable User Namespaces by setting `spec.hostUsers: false` in the Pod specification
    to ensure that even if a container runs as root, it is mapped to a non-privileged
    user on the node.
tags:
  - security
  - least-privilege
  - container-runtime
tools: []

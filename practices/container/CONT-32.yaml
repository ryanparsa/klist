id: CONT-32
title: Restrict ServiceAccount Tokens to Workloads
stage: active
description: |
  ServiceAccount tokens are intended exclusively for applications and controllers running inside the cluster. Distributing them to human end-users circumvents external identity providers, bypasses MFA enforcement, and makes it impossible to reliably attribute API actions to specific individuals during an audit.

  **What to check:**

  Audit kubeconfig files used by developers or in CI/CD pipelines to ensure they do not contain long-lived ServiceAccount tokens.

  ```bash
  grep -r "token:" ~/.kube/config
  ```

mitigations:
  - "Audit kubeconfig files in CI/CD systems and developer workstations for ServiceAccount tokens."
  - "Replace ServiceAccount token-based kubeconfigs used by humans with OIDC credentials."
  - "Rotate or delete stale tokens immediately."
tags:

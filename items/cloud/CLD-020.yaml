id: CLD-020
title: Use Customer-Managed Keys for Kubernetes Data Encryption
description: |
  Managed Kubernetes providers encrypt cluster data at rest using provider-owned keys by
  default. While this protects against physical media theft, it does not protect against a
  compromised cloud account or insider threat at the provider level.

  Customer-Managed Keys (CMK) give the customer control over the encryption key lifecycle:
  - Rotation on a defined schedule
  - Revocation to immediately block all access to encrypted data
  - Audit visibility via KMS access logs
mitigations:
  - |-
    Create a dedicated KMS key for the cluster with a rotation schedule of 1 year
    or less. Apply the `associate-encryption-config` command (EKS) or equivalent for your
    provider. Restrict KMS key usage via key policy to only the cluster's IAM role. Enable
    CloudTrail/Cloud Audit Logs on KMS to audit all Decrypt and GenerateDataKey calls.
  - |
    EKS-specific guidance: Kubernetes 1.28+ enables envelope encryption using an
    AWS-owned key by default. To use a CMK:
    ```bash
    aws eks associate-encryption-config \
      --cluster-name <cluster-name> \
      --encryption-config '[{"resources":["secrets"],"provider":{"keyArn":"arn:aws:kms:<region>:<account-id>:key/<key-id>"}}]'
    ```

    This encrypts Kubernetes Secrets (and optionally ConfigMaps) in etcd using the
    AWS KMS key. Grant the EKS cluster IAM role `kms:GenerateDataKey` and `kms:Decrypt`
    on the CMK.
  - |
    GKE: Use Application-Layer Secrets Encryption with a Cloud KMS key.
  - |
    AKS: Use customer-managed keys for etcd encryption via Azure Key Vault.
tags:

id: CLUD-8
title: Maintain a Patch Management Process for Nodes
stage: active
description: |
  Kubernetes nodes run a full OS stack. Unpatched kernels and system packages are a common
  vector for container-escape and privilege-escalation attacks. Kubernetes minor versions
  also have a support window of approximately 14 months - clusters must be upgraded before
  end-of-support.

  **What to check:** Compare the Kubernetes version of each node against the current release.
  Check OS package patch dates. Verify a documented patch cadence exists (e.g., monthly OS
  patching, quarterly K8s upgrades).
mitigations:
  - |-
    Automate node pool rotation on a schedule. Use managed update channels
    (EKS managed node groups, GKE release channels). Enable automated OS security patches via
    the node OS tooling (e.g., `yum-cron`, `unattended-upgrades`).
tags:
  - node-security
  - patching
  - vulnerability-management
tools:
  - title: Karpenter
    url: https://karpenter.sh/
  - title: Cluster Autoscaler
    url: https://github.com/kubernetes/autoscaler/tree/master/cluster-autoscaler
  - title: kube-bench
    url: https://github.com/aquasecurity/kube-bench
references:
  - title: PCI-DSS Requirement 6.3 - Security Vulnerabilities Addressed
    url: https://www.pcisecuritystandards.org/document_library/
  - title: SOC 2 CC7.4 - Incident Response and Recovery

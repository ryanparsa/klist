id: CLD-012
title: "Implement Log Retention and Archival"
description: |
  Ensure a robust retention policy is set for your cluster and application logs. Maintain sufficient historical active logs 
  (typically 30-45 days) for operational troubleshooting, and securely archive older logs to deep storage to meet compliance requirements.
tags: [configuration, logging, compliance]
references:
  - title: "Kubernetes Docs — Logging Architecture"
    url: "https://kubernetes.io/docs/concepts/cluster-administration/logging/"
  - title: "SOC 2 CC7.2 — Security Event Monitoring"
    url: "https://www.aicpa.org/resources/article/soc-2-trust-service-principles"

id: CLD-011
title: Use the Cluster Autoscaler for Highly Variable Workloads
description: |
  Clusters experiencing highly variable workloads that occasionally outpace available node capacity require dynamic scaling. Without an automated scaling mechanism, Pods may fail to schedule when node capacity is exhausted, or the cluster may be over-provisioned during low-usage periods, wasting resources.
mitigations:
  - |-
    Deploy the Cluster Autoscaler (or Karpenter on AWS) to the cluster via Helm
    or the provider-managed add-on. Configure minimum and maximum node counts per node group.
    Ensure node groups are tagged correctly so the autoscaler can discover them. Set scale-down
    thresholds and cooldown periods to prevent thrashing.
tags:
  - application-development
  - scaling
  - cluster-autoscaler

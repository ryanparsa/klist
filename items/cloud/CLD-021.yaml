id: CLD-021
title: Use Cloud Storage Providers for Application Data
description: |
  Relying solely on local ephemeral storage or in-cluster host volumes (like `hostPath` or `emptyDir`) can lead to permanent data loss
  if a node fails or a pod is evicted. While Kubernetes manages workloads, it does not natively provide backup or replication
  for host-level storage.

  Using cloud storage services (e.g., managed block storage, file shares, or object storage) allows workloads to leverage
  built-in cloud capabilities such as automated backups, snapshots, encryption at rest, and high availability.

  **What to check:**
  - Audit PersistentVolumes to check if they are backed by cloud provider storage classes.
    ```sh
    kubectl get pv -o custom-columns=NAME:.metadata.name,CAPACITY:.spec.capacity.storage,CLASS:.spec.storageClassName
    ```
mitigations:
  - |
    Provision PersistentVolumes using cloud-native Container Storage Interface (CSI) drivers (e.g., AWS EBS, GCP Persistent Disk, Azure Disk).
    Configure appropriate StorageClasses for workloads requiring persistent state:
    ```yaml
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: managed-premium
    provisioner: disk.csi.azure.com
    parameters:
      skuName: Premium_LRS
    reclaimPolicy: Retain
    volumeBindingMode: WaitForFirstConsumer
    ```
tags:
  - storage
  - resilience
  - architecture
tools:

id: CLST-14
title: Run Multiple Replicas for Deployments
stage: active
description: |
  Running a standalone Pod individually creates a critical single point of failure. A hardware failure of the physical machine, a kernel panic, or a node drain will permanently delete the standalone workload and cause immediate application downtime.
mitigations:
  - |-
    Set `replicas: 2` (or higher) in all Deployment, StatefulSet, and ReplicaSet
    manifests. Never run critical workloads as bare Pods. Use `kube-score` or Kyverno policies
    to reject single-replica deployments in production namespaces.
tags:
  - application-development
  - reliability
  - fault-tolerance
tools:
  - title: kube-score
    url: https://github.com/zegl/kube-score
  - title: Kyverno
    url: https://kyverno.io/
references:
  - title: Kubernetes Docs - Deployments
    url: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
  - title: Kubernetes Docs - ReplicaSets
    url: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/

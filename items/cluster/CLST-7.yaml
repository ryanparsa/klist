id: CLST-7
title: Use a Dedicated Certificate Authority for etcd
stage: active
description: |
  etcd is the backing store for all cluster state and secrets. If etcd shares a certificate authority 
  with the main Kubernetes cluster, a compromised Kubernetes component could forge etcd client certificates 
  and gain direct root access to the datastore, bypassing RBAC entirely.

  **What to check:**

  ```
  ps aux | grep etcd | grep trusted-ca-file
  ```

  Verify the CA file referenced by `--trusted-ca-file` is different from the Kubernetes
  cluster CA (`/etc/kubernetes/pki/ca.crt`).
mitigations:
  - |-
    Generate a separate CA for etcd during cluster bootstrap (e.g., kubeadm
    does this by default via `/etc/kubernetes/pki/etcd/ca.crt`). Do not reuse the cluster CA
    for etcd peer and client certificates.
tags:
  - etcd
  - pki
  - tls
  - certificates

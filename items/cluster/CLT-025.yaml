id: CLT-025
title: Restrict Access to Alpha or Beta Features
description: |
  Alpha and beta Kubernetes features are in active development and may have limitations or bugs that result in stability issues or security vulnerabilities. Enabling experimental feature gates unnecessarily expands the cluster's attack surface with unvetted code.
mitigations:
  - |-
    Review the list of enabled feature gates on each cluster component (API server,
    kubelet, controller manager, scheduler). Remove any `--feature-gates=<AlphaFeature>=true`
    flags that are not required for production workloads. Consult the Kubernetes changelog
    before each upgrade to identify newly promoted or removed features.
tags:
  - configuration
  - security
  - stability
tools:
  - title: kube-bench
    url: https://github.com/aquasecurity/kube-bench
references:
  - title: Kubernetes Docs - Feature Gates
    url: https://kubernetes.io/docs/reference/command-line-tools-reference/feature-gates/
  - title: NSA/CISA Kubernetes Hardening Guide
    url: https://media.defense.gov/2022/Aug/29/2003066362/-1/-1/0/CTR_KUBERNETES_HARDENING_GUIDANCE_1.2_20220829.PDF

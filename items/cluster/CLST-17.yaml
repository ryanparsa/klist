id: CLST-17
title: Define a LimitRange for Each Namespace
stage: active
description: |
  Namespaces without a `LimitRange` object allow the accidental deployment of Pods lacking explicit memory and CPU configurations. A `LimitRange` enforces standard sizes or minimums/maximums for containers, acting as an automated safety net for cluster-wide resource utilization.
mitigations:
  - |-
    Create a `LimitRange` manifest in each namespace specifying default CPU and
    memory requests and limits. Use a Kyverno or OPA Gatekeeper policy to reject namespace
    creation that does not include a LimitRange, or automatically create one via a namespace
    provisioning workflow.
tags:
  - application-development
  - resource-management
  - namespaces

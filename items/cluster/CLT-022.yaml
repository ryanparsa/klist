id: CLT-022
title: "Use Horizontal Pod Autoscaler for Variable Workloads"
description: |
  Rely on the Horizontal Pod Autoscaler (HPA) to automatically add or remove Pod replicas based on current usage metrics (e.g. CPU, memory, custom metrics). This ensures the application remains responsive during traffic spikes without wasting resources during quiet periods.
tags: [application-development, scaling, hpa]
references:

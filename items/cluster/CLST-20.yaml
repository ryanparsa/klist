id: CLST-20
title: Apply Security Labels to Resources
stage: active
description: |
  Security labels group resources by compliance demands and security requirements. Key labels typically represent the data-confidentiality level (`confidentiality`) or the compliance standard the workload must adhere to (`compliance: pci`). These metadata markers simplify automated security assessments and auditing.
mitigations:
  - |-
    Establish a security labeling convention (e.g., `confidentiality: high`,
    `compliance: pci-dss`) and apply it to all workloads that handle regulated data. Use these
    labels in NetworkPolicy selectors, OPA/Kyverno policies, and SIEM queries to automatically
    scope controls to the right workloads.
tags:
  - application-development
  - tagging
  - security
tools:
  - title: Kyverno
    url: https://kyverno.io/
references:
  - title: AWS Tagging Strategies
    url: https://aws.amazon.com/answers/account-management/aws-tagging-strategies/
  - title: Kubernetes Docs - Labels and Selectors
    url: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/

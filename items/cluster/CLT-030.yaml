id: CLT-030
title: Enforce ResourceQuotas for Namespaces
description: |
  While LimitRanges ensure individual Pods have sensible sizes, they do not prevent a workload or user from deploying tens of thousands of Pods or ConfigMaps. Without a `ResourceQuota`, a single namespace can exhaust the cluster's entire capacity of CPU, memory, or API objects, leading to a system-wide denial of service.
mitigations:
  - |-
    Create a `ResourceQuota` manifest for each namespace that limits total CPU,
    memory, and object counts (pods, services, configmaps, secrets). Automate quota creation
    as part of namespace provisioning. Use Kyverno or OPA Gatekeeper policies to require
    quotas before workloads can be deployed.
tags:

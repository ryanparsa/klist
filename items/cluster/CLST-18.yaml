id: CLST-18
title: Apply Technical Labels to Resources
stage: active
description: |
  Technical labels organize Kubernetes objects and assist in automation. Common examples include grouping by application name (`app.kubernetes.io/name`), application instance (`app.kubernetes.io/instance`), version, architecture component, and management tool. Without standard labels, auditing and operating workloads at scale becomes unmanageable.
mitigations:
  - |-
    Add the standard `app.kubernetes.io/*` labels to all workload manifests:
    `name`, `instance`, `version`, `component`, `part-of`, and `managed-by`. Enforce their
    presence using Kyverno `require-labels` policies or OPA Gatekeeper constraints in
    production namespaces.
tags:
  - application-development
  - tagging
  - metadata
tools:
  - title: Kyverno
    url: https://kyverno.io/
  - title: kube-score
    url: https://github.com/zegl/kube-score
references:

id: CLT-032
title: Enforce Principle of Least Privilege in RBAC Policies
description: |
  Granting broad permissions in RBAC policies provides unnecessary API access and poses a significant security risk. The Principle of Least Privilege dictates that an entity should only be granted the absolute minimum permissions required to perform its function.
mitigations:
  - |-
    Start with an empty Role and add only the specific API groups, resources,
    and verbs required. Use `kubectl auth can-i --list` to verify actual permissions. Run
    RBAC Lookup or Krane to identify over-permissioned service accounts and roles. Adopt a
    GitOps approach for RBAC manifests to ensure all permissions are peer-reviewed.
tags:
  - governance
  - rbac
  - security
tools:
  - title: RBAC Lookup
    url: https://github.com/FairwindsOps/rbac-lookup
  - title: Krane
    url: https://github.com/appvia/krane

id: CLST-26
title: Use OIDC for User Authentication
stage: active
description: |
  Static tokens and basic authentication models are difficult to rotate, audit, and revoke. Integrating OpenID Connect (OIDC) offloads human user authentication to centralized identity providers (like Google Identity, AWS IAM, or Okta), ensuring the cluster inherits the organization's existing MFA and access lifecycle policies.

  **What to check:**
  ```bash
  ps aux | grep kube-apiserver | grep oidc
  ```

  ```mermaid
  flowchart TD
    A[User] -->|Auth| B[OIDC Provider]
    B -->|Token| C[API Server]
  ```
mitigations:
  - "Configure the API server with `--oidc-issuer-url`, `--oidc-client-id`, and `--oidc-username-claim` flags to integrate with an identity provider (Okta, Azure AD, Google, Dex)."
  - "Use a client tool such as `kubelogin` or `kubelogin` (azure) on developer workstations."
  - "Remove any static token files (`--token-auth-file`) or basic auth files from the API server configuration."
tags:
  - configuration
  - authentication
  - security
tools:

id: CLT-015
title: Use Pod Anti-Affinity Rules to Spread Workload
description: |
  Even if multiple replicas are deployed, a single node failure will take down the entire application if all replicas are scheduled onto the same physical node. Pod anti-affinity is required to ensure replicas are geographically distributed across different nodes or availability zones.
mitigations:
  - |-
    Add a `podAntiAffinity` rule using `preferredDuringSchedulingIgnoredDuringExecution`
    (soft) or `requiredDuringSchedulingIgnoredDuringExecution` (hard) in your Deployment's pod
    spec. Match on `app.kubernetes.io/name` or a similar label to ensure replicas land on
    distinct nodes. Prefer topology key `kubernetes.io/hostname` for node-level spreading, or
    `topology.kubernetes.io/zone` for zone-level resilience.
tags:
  - application-development
  - fault-tolerance
  - scheduling
tools:

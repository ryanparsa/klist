id: CONT-18
title: Configure the Appropriate Quality of Service (QoS)
stage: active
description: |
  When a node goes into an overcommitted state, Kubernetes evicts Pods based on their QoS class (Guaranteed, Burstable, BestEffort). By failing to correctly configure CPU/Memory requests and limits, workloads can be evicted unexpectedly.

  What to check:
  Look for pods that are not assigned the desired QoS class, or pods running in `BestEffort` which are the first to be evicted.
  ```bash
  kubectl get pods -A -o custom-columns="NAMESPACE:.metadata.namespace,NAME:.metadata.name,QOS:.status.qosClass" | grep BestEffort
  ```
mitigations:
  - |-
    Correctly configure CPU/Memory requests and limits to dictate the QoS for your Pods and determine their predictable eviction priority. To achieve `Guaranteed` QoS, specify both limits and requests, and make them equal for CPU and Memory.

    ```yaml
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    ```
  - |-
    To achieve `Burstable` QoS, you only need to ensure requests are less than limits, or specify requests without limits.

    ```yaml
    resources:
      requests:
        memory: "512Mi"
      limits:
        memory: "1Gi"
    ```
tags:
  - application-development
  - resource-utilisation
  - qos
tools: []
references:

    url: https://medium.com/@betz.mark/understanding-resource-limits-in-kubernetes-cpu-time-9eff74d3161b
  - title: Kubernetes Docs - Resource Management
    url: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/

id: CNT-012
title: Configure a Passive Liveness Probe
description: |
  The liveness probe is a deadlock-detection mechanism - not a health check for application
  logic. Its sole purpose is to detect a process that is still running but no longer
  responsive (e.g., stuck in an infinite loop, deadlocked threads). If liveness probes incorrectly evaluate application or downstream health, it can lead to aggressive, unwarranted pod restarts.

  **What to check:**
  ```
  kubectl get pods -A -o json | \
    jq '.items[] | select(.spec.containers[].livenessProbe == null) | .metadata.name'
  ```
mitigations:
  - |-
    Add a `/livez` route to your application server that returns `200 OK`
    without performing any work. Configure `livenessProbe.httpGet.path: /livez` in the pod
    spec with appropriate thresholds for your workload's startup time.
  - |-
    Use a dedicated, lightweight endpoint for liveness that returning HTTP 200 unconditionally.
    Never include downstream dependency checks (database, cache, APIs) in this endpoint.
    Never use the same endpoint as the readiness probe.
tags:
  - application-development
  - probes
  - reliability
tools: []
references:

id: CONT-10
title: Configure Readiness Probes for All Containers
stage: active
description: |
  Kubernetes routes traffic to a pod only when its readiness probe succeeds. Without a
  readiness probe, the kubelet assumes the app is ready the moment the container starts -
  which means requests may be sent to a pod that hasn't finished initialising, causing errors.

  Improperly configured probes (like checking downstream dependencies or sharing endpoints with liveness probes) can spread failures upstream and mask localised state issues.

  **What to check:**
  ```
  kubectl get pods -A -o json | \
    jq '.items[] | select(.spec.containers[].readinessProbe == null) | .metadata.name'
  ```
mitigations:
  - |-
    Define a readiness probe for all containers using a dedicated local state endpoint (e.g., `/readyz`).
    The readiness probe must not check downstream dependencies (databases, APIs); only check
    local state. Set `initialDelaySeconds` and `failureThreshold` appropriate to your app's startup time.
tags:
  - application-development
  - probes
  - reliability
tools: []
references:

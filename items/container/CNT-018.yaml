id: CNT-018
title: Configure the Appropriate Quality of Service (QoS)
description: |
  When a node goes into an overcommitted state, Kubernetes evicts Pods based on their QoS class (Guaranteed, Burstable, BestEffort). By failing to correctly configure CPU/Memory requests and limits, workloads can be evicted unexpectedly.
mitigations:
  - |-
    Correctly configure CPU/Memory requests and limits to dictate the QoS for your Pods and determine their predictable eviction priority.
tags:
  - application-development
  - resource-utilisation
  - qos
tools: []
